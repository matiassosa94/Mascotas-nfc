<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐾 Perfil de Mascota</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --verde:#2ecc71;
      --verde-dark:#27ae60;
      --naranja:#f39c12;
      --crema:#fdf6ec;
      --cafe:#5c3d1e;
    }
    body{
      background:var(--crema);
      font-family:'Nunito',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-bottom:48px;
    }

    .hero{
      width:100%;
      background:linear-gradient(150deg,#27ae60 0%,#2ecc71 55%,#f39c12 100%);
      padding:44px 24px 88px;
      text-align:center;
      position:relative;
      clip-path:ellipse(110% 100% at 50% 0%);
    }
    .paw-bg{
      position:absolute;top:10px;right:14px;
      font-size:90px;opacity:.1;
      transform:rotate(18deg);pointer-events:none;
    }
    .badge{
      display:inline-block;
      background:rgba(255,255,255,.22);
      color:#fff;font-size:11px;font-weight:900;
      letter-spacing:2px;text-transform:uppercase;
      padding:5px 16px;border-radius:999px;
      margin-bottom:18px;backdrop-filter:blur(4px);
    }
    .photo-wrap{
      width:148px;height:148px;
      margin:0 auto 16px;
      border-radius:50%;
      border:5px solid #fff;
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      overflow:hidden;
      background:#e8f5e9;
      animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
    .photo-wrap img{width:100%;height:100%;object-fit:cover;}
    .photo-placeholder{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      font-size:64px;
    }
    .pet-name{
      font-family:'Pacifico',cursive;
      font-size:40px;color:#fff;
      text-shadow:0 3px 10px rgba(0,0,0,.2);
      animation:up .5s .2s ease both;
    }
    .pet-breed{
      color:rgba(255,255,255,.92);
      font-size:16px;font-weight:700;
      margin-top:5px;
      animation:up .5s .3s ease both;
    }
    @keyframes up{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}

    .lost{
      display:none;
      align-items:center;gap:10px;
      background:#fff3cd;border:2px solid #f39c12;
      border-radius:16px;padding:14px 18px;
      margin-bottom:18px;
      font-weight:900;color:#856404;font-size:15px;
    }
    .lost.show{display:flex;}

    .card{
      background:#fff;
      border-radius:26px;
      box-shadow:0 6px 32px rgba(0,0,0,.1);
      margin:-44px 18px 18px;
      padding:28px 22px;
      width:calc(100% - 36px);
      max-width:420px;
      animation:up .5s .4s ease both;
    }
    .section-label{
      font-size:10px;font-weight:900;
      letter-spacing:2.5px;text-transform:uppercase;
      color:var(--verde-dark);margin-bottom:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;margin-bottom:20px;
    }
    .info-item{
      background:var(--crema);
      border-radius:14px;padding:13px;
      display:flex;flex-direction:column;gap:3px;
    }
    .info-item .ico{font-size:20px;margin-bottom:2px;}
    .info-item .lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#bbb;}
    .info-item .val{font-size:15px;font-weight:900;color:var(--cafe);}

    .desc{
      background:#f0faf4;
      border-left:4px solid var(--verde);
      border-radius:0 12px 12px 0;
      padding:13px 15px;
      margin-bottom:22px;
      font-size:14px;color:#444;line-height:1.6;
    }

    .btns{display:flex;flex-direction:column;gap:11px;}
    .btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      padding:15px;border-radius:16px;
      font-family:'Nunito',sans-serif;
      font-size:16px;font-weight:900;
      text-decoration:none;border:none;cursor:pointer;
      transition:transform .15s;
    }
    .btn:active{transform:scale(.97);}
    .btn svg{width:22px;height:22px;fill:#fff;flex-shrink:0;}
    .btn-call{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;box-shadow:0 6px 20px rgba(46,204,113,.38);}
    .btn-wa{background:linear-gradient(135deg,#128C7E,#25D366);color:#fff;box-shadow:0 6px 20px rgba(37,211,102,.32);}
    .btn-map{background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;box-shadow:0 6px 20px rgba(243,156,18,.32);}

    .footer{
      margin-top:24px;text-align:center;
      font-size:11px;color:#ccc;
    }
    .footer a{color:var(--verde-dark);font-weight:700;text-decoration:none;}
    .hidden{display:none!important;}
  </style>
</head>
<body>

<div class="hero">
  <div class="paw-bg">🐾</div>
  <div class="badge">🐾 Perfil de Mascota</div>
  <div class="photo-wrap">
    <img id="petPhoto" src="" alt="Foto" style="display:none"/>
    <div class="photo-placeholder" id="petPlaceholder">🐶</div>
  </div>
  <div class="pet-name" id="petName">Mi Mascota</div>
  <div class="pet-breed" id="petBreed"></div>
</div>

<div class="card">

  <div class="lost" id="lostBanner">
    🚨 ¡Esta mascota está perdida! Por favor contactá a su dueño.
  </div>

  <div class="section-label">Información</div>

  <div class="grid" id="grid">
    <div class="info-item hidden" id="boxEdad">
      <span class="ico">🎂</span>
      <span class="lbl">Fecha de nacimiento</span>
      <span class="val" id="valEdad"></span>
    </div>
    <div class="info-item hidden" id="boxColor">
      <span class="ico">🎨</span>
      <span class="lbl">Color</span>
      <span class="val" id="valColor"></span>
    </div>
    <div class="info-item hidden" id="boxBarrio">
      <span class="ico">📍</span>
      <span class="lbl">Barrio</span>
      <span class="val" id="valBarrio"></span>
    </div>
    <div class="info-item hidden" id="boxSexo">
      <span class="ico">⚥</span>
      <span class="lbl">Sexo</span>
      <span class="val" id="valSexo"></span>
    </div>
    <div class="info-item hidden" id="boxVacunas">
      <span class="ico">💉</span>
      <span class="lbl">Vacunas</span>
      <span class="val" id="valVacunas"></span>
    </div>
    <div class="info-item hidden" id="boxVet">
      <span class="ico">🏥</span>
      <span class="lbl">Veterinaria</span>
      <span class="val" id="valVet"></span>
    </div>
  </div>

  <div class="desc hidden" id="descBox">
    <span id="valDesc"></span>
  </div>

  <div class="section-label">Contactar al dueño</div>
  <div class="btns">
    <a class="btn btn-call" id="btnCall" href="#">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      Llamar al dueño
    </a>
    <a class="btn btn-wa" id="btnWa" href="#">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp al dueño
    </a>
    <a class="btn btn-map hidden" id="btnMap" href="#">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Ver zona del dueño
    </a>
  </div>
</div>

<div class="footer">
  Llavero NFC por <a href="https://linktr.ee/Crecimientos_digital" target="_blank">Crecimiento Digital</a>
</div>

<script>
  const p = new URLSearchParams(window.location.search);
  const get = k => p.get(k) || '';

  // Nombre y raza
  const nombre = get('nombre');
  const raza = get('raza');
  if (nombre) document.getElementById('petName').textContent = nombre;
  if (raza)   document.getElementById('petBreed').textContent = '🐕 ' + raza;
  if (nombre) document.title = '🐾 ' + nombre;

  // Foto
  const fotoUrl = get('foto');
  if (fotoUrl) {
    const img = document.getElementById('petPhoto');
    img.src = fotoUrl;
    img.style.display = 'block';
    document.getElementById('petPlaceholder').style.display = 'none';
  }

  // Banner perdido
  if (get('perdido') === 'si') {
    document.getElementById('lostBanner').classList.add('show');
  }

  // Campos info
  [
    ['nacimiento','boxEdad','valEdad'],
    ['color','boxColor','valColor'],
    ['barrio','boxBarrio','valBarrio'],
    ['sexo','boxSexo','valSexo'],
    ['vacunas','boxVacunas','valVacunas'],
    ['vet','boxVet','valVet'],
  ].forEach(([param, box, val]) => {
    const v = get(param);
    if (v) {
      document.getElementById(val).textContent = v;
      document.getElementById(box).classList.remove('hidden');
    }
  });

  // Descripción
  const desc = get('desc');
  if (desc) {
    document.getElementById('valDesc').textContent = desc;
    document.getElementById('descBox').classList.remove('hidden');
  }

  // Teléfono
  const tel = get('tel').replace(/\D/g,'');
  if (tel) {
    document.getElementById('btnCall').href = 'tel:+54' + tel;
    document.getElementById('btnWa').href = 'https://wa.me/54' + tel + '?text=' + encodeURIComponent('Hola! Encontré a ' + (nombre || 'tu mascota') + ' 🐾');
  }

  // Ubicación
  const ubicacion = get('ubicacion');
  if (ubicacion) {
    document.getElementById('btnMap').href = 'https://www.google.com/maps/search/' + encodeURIComponent(ubicacion);
    document.getElementById('btnMap').classList.remove('hidden');
  }
</script>
</body>
</html>
